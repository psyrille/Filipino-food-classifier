name: filipino_food_scanner
description: A Filipino food recognition app

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

  # Image Handling
  image_picker: ^1.0.4
  camera: ^0.10.5+5

  # ML & AI
  tflite_flutter: ^0.11.0
  image: ^4.1.3

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0

  connectivity_plus: ^4.0.1

  # State Management
  provider: ^6.1.0

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Permissions
  permission_handler: ^11.0.1

  supabase_flutter: ^2.0.0

  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/food/
    - assets/images/logos/
    - assets/images/bg/
    - assets/model/model.tflite
    - assets/labels.txt
    - assets/images/
